<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BebeCam - Monitor de Bebé</title>
    <!-- Modern, friendly premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #1e1b4b; /* Deep Indigo */
            --bg-end: #0f172a; /* Slate 900 */
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --live-glow: #f43f5e; /* Rose 500 */
            --btn-gradient-1: #2563eb; /* Blue 600 */
            --btn-gradient-2: #0284c7; /* Light Blue 600 */
            /* Default video filters */
            --video-brightness: 100%;
            --video-contrast: 100%;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, var(--bg-start), var(--bg-end) 80%);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Auto-hide classes */
        .ui-layer {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            position: absolute;
            width: 100%;
            pointer-events: none;
        }

        .ui-hidden {
            opacity: 0;
            pointer-events: none !important;
        }

        .ui-hidden.top-bar { transform: translateY(-20px); }
        .ui-hidden.controls-container { transform: translateY(20px) scale(0.95); }

        /* Top Bar */
        .top-bar {
            top: 0;
            left: 0;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0) 100%);
            pointer-events: auto;
            box-sizing: border-box;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-text { display: flex; flex-direction: column; }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 16px rgba(199, 210, 254, 0.3);
            margin-bottom: -4px;
        }

        .brand-subtitle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: #818cf8;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }



        .top-right-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon-only {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .btn-icon-only:active { transform: scale(0.9); }
        .btn-icon-only.active {
            background: rgba(250, 204, 21, 0.2);
            border-color: rgba(250, 204, 21, 0.5);
            color: #fde047;
        }

        /* Glowing Live Badge */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(244, 63, 94, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 99px;
            border: 1px solid rgba(244, 63, 94, 0.3);
            box-shadow: 0 8px 16px -4px rgba(244, 63, 94, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .live-indicator.reconnecting {
            background: rgba(250, 204, 21, 0.15);
            border-color: rgba(250, 204, 21, 0.3);
            box-shadow: none;
        }
        .live-indicator.reconnecting .live-dot {
            background-color: #facc15;
            box-shadow: 0 0 10px #facc15;
            animation: none;
        }
        .live-indicator.reconnecting .live-text {
            color: #fef08a;
            text-shadow: none;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: var(--live-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--live-glow), 0 0 20px var(--live-glow);
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .live-text {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ffe4e6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(244, 63, 94, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        /* Video Container */
        .video-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            z-index: 10;
            overflow: hidden; /* For zooming */
        }

        .video-transform-layer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
            transition: transform 0.1s ease-out; /* smooth snapping during pinch */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: contain;
            pointer-events: none;
            filter: brightness(var(--video-brightness)) contrast(var(--video-contrast));
            transition: filter 0.3s;
        }

        /* Night Mode Overlay */
        .night-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .night-overlay.active { opacity: 1; }

        /* Interactive layer */
        .interaction-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 40;
            touch-action: none; /* Crucial for custom Pinch to Zoom */
        }

        /* Settings Panel */
        .settings-panel {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            z-index: 45;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .settings-panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-row label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Bottom Controls */
        .controls-container {
            bottom: 40px;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .controls-bar {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            pointer-events: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            max-width: 600px;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: white;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
        }

        .btn:active { transform: scale(0.92); }

        .btn-settings { color: #cbd5e1; padding: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-refresh { color: #f8fafc; border: 1px solid rgba(255,255,255,0.1); }

        .btn-fullscreen {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            border: none;
            flex-grow: 1;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .hint {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div class="video-wrapper" id="videoWrapper">
        <div class="video-transform-layer" id="videoTransform">
            <iframe id="streamFrame" src="" allow="autoplay; fullscreen; playsinline"></iframe>
            </div>
    </div>

    <!-- Night mode dim layer -->
    <div class="night-overlay" id="nightOverlay"></div>
    
    <!-- Invisible layer to catch taps and pinches -->
    <div class="interaction-layer" id="interactionLayer"></div>

    <!-- UI Overlay -->
    <div class="ui-layer top-bar" id="uiTop">
        <div class="brand">
            <div class="brand-text">
                <span class="brand-title">BebeCam</span>
                <div class="brand-subtitle-container">
                    <span class="brand-subtitle">Cámara Trasera</span>
                </div>
            </div>
            </div>
            <div class="top-right-controls">
                <button class="btn-icon-only" id="nightModeBtn" aria-label="Modo Noche en Ruta">
                    <svg class="icon" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                        <path
                            d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
                    </svg>
                </button>
                <div class="live-indicator" id="liveInd">
                    <div class="live-dot"></div>
                <span class="live-text" id="liveTxt">En Vivo</span>
                </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="setting-row">
            <label>Brillo <span id="valBrightness">100%</span></label>
            <input type="range" id="sliderBrightness" min="20" max="200" step="10" value="100">
        </div>
        <div class="setting-row">
            <label>Contraste <span id="valContrast">100%</span></label>
            <input type="range" id="sliderContrast" min="50" max="200" step="10" value="100">
        </div>
    </div>
    
    <!-- Bottom Action Bar -->
    <div class="ui-layer controls-container" id="uiBottom">
        <div class="controls-bar">
            <button class="btn btn-settings" id="toggleSettingsBtn" aria-label="Ajustes Visuales">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                </svg>
            </button>
            <button class="btn btn-refresh" onclick="reloadStream()" aria-label="Recargar Video">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
            <button class="btn btn-fullscreen" onclick="toggleFullScreen()" id="fsBtn">
                <svg class="icon" viewBox="0 0 24 24" id="fsIcon">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
                <span id="fsText">Pantalla</span>
            </button>
        </div>
    </div>
    <div class="ui-layer hint" id="uiHint">Toca o pellizca el video</div>

    <script>
        const host = window.location.hostname;
        const iframe = document.getElementById('streamFrame');
            const port = 8889;
            const streamUrl = `http://${host}:${port}/bebe`;
            iframe.src = streamUrl;

            // Auto-Reconnect Logic
            const liveInd = document.getElementById('liveInd');
            const liveTxt = document.getElementById('liveTxt');
            let checkActive = true;

            async function checkConnection() {
                if (!checkActive) return;
                try {
                    // Quick shallow check against the stream URL itself using no-cors mode
                    // This resolves if the server is up, and rejects if the network is down or server died
                    await fetch(streamUrl, { mode: 'no-cors', signal: AbortSignal.timeout(3000) });

                    liveInd.classList.remove('reconnecting');
                    liveTxt.textContent = "EN VIVO";
                } catch (err) {
                    // We lost connection
                    liveInd.classList.add('reconnecting');
                    liveTxt.textContent = "CONECTANDO...";

                    console.log("Connection lost, auto-reloading...");
                    iframe.src = '';
                    setTimeout(() => { iframe.src = streamUrl; }, 1000);
                }
            }
            setInterval(checkConnection, 5000); // Check every 5s

            function reloadStream() {
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => { iframe.src = currentSrc; }, 50);
                    wakeUI();
                }

                // Night Mode
                const nightModeBtn = document.getElementById('nightModeBtn');
                const nightOverlay = document.getElementById('nightOverlay');
                let isNightMode = false;
                nightModeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isNightMode = !isNightMode;
                    nightOverlay.classList.toggle('active');
                    nightModeBtn.classList.toggle('active');
                });

                // Settings Sliders
                const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
                const settingsPanel = document.getElementById('settingsPanel');
                let isSettingsOpen = false;

                toggleSettingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isSettingsOpen = !isSettingsOpen;
                    settingsPanel.classList.toggle('active');
            wakeUI(); 
            if (isSettingsOpen) clearTimeout(hideTimeout); // keep UI open while settings open
        });

                const sBrightness = document.getElementById('sliderBrightness');
                const sContrast = document.getElementById('sliderContrast');
                const vBrightness = document.getElementById('valBrightness');
                const vContrast = document.getElementById('valContrast');

                    // Haptic Feedback Helper
                    function hapticFeedback(pattern = 15) {
                        if (navigator.vibrate) {
                            navigator.vibrate(pattern);
                        }
                    }

                    // Add haptics to standard buttons
                    document.querySelectorAll('.btn, .btn-icon-only').forEach(btn => {
                        btn.addEventListener('touchstart', () => hapticFeedback(10), { passive: true });
                    });

                            function updateVideoFilters(e) {
                            const targetInput = e.target;
                        let val = parseInt(targetInput.value);

                            if (targetInput.dataset.lastValue != val) {
                                targetInput.dataset.lastValue = val;
                                if (val === 100) {
                                    hapticFeedback([30, 20, 30]); // Distinct center snap
                        } else {
                                hapticFeedback(10); // Normal step snap
                            }
                        }

                    document.documentElement.style.setProperty('--video-brightness', `${sBrightness.value}%`);
                    document.documentElement.style.setProperty('--video-contrast', `${sContrast.value}%`);
                    vBrightness.textContent = `${sBrightness.value}%`;
                    vContrast.textContent = `${sContrast.value}%`;
                }

    // Use both input and touchmove for fluid feedback
                sBrightness.addEventListener('input', updateVideoFilters);
                sContrast.addEventListener('input', updateVideoFilters);

                // Prevent events on settings panel from bubbling to the interactive layer
                settingsPanel.addEventListener('touchstart', e => e.stopPropagation());
                settingsPanel.addEventListener('touchmove', e => e.stopPropagation());
                settingsPanel.addEventListener('click', e => e.stopPropagation());


                // Pinch to Zoom Logic
                const interactionLayer = document.getElementById('interactionLayer');
                const videoTransformLayer = document.getElementById('videoTransform');

                let currentScale = 1;
                let currentX = 0;
                let currentY = 0;

                let initialPinchDistance = null;
                let initialScale = 1;

                let initialTouchX = 0;
                let initialTouchY = 0;
                let initialPanX = 0;
                let initialPanY = 0;

                function getDistance(touches) {
                    return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
                }

                function applyTransform() {
                    videoTransformLayer.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
                }

                interactionLayer.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        // Start pincho
                        initialPinchDistance = getDistance(e.touches);
                        initialScale = currentScale;
                    } else if (e.touches.length === 1 && currentScale > 1) {
                        // Start pan if zoomed in
                        initialTouchX = e.touches[0].pageX;
                        initialTouchY = e.touches[0].pageY;
                        initialPanX = currentX;
                        initialPanY = currentY;
                    }
                });

                interactionLayer.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 2) {
                        // Zooming
                        e.preventDefault();
                        const currentDistance = getDistance(e.touches);
                        const scaleFactor = currentDistance / initialPinchDistance;
                        currentScale = Math.min(Math.max(1, initialScale * scaleFactor), 4); // Limit zoom 1x - 4x
                        applyTransform();
                    } else if (e.touches.length === 1 && currentScale > 1) {
                        // Panning
                        e.preventDefault();
                        const deltaX = e.touches[0].pageX - initialTouchX;
                        const deltaY = e.touches[0].pageY - initialTouchY;
                        currentX = initialPanX + deltaX;
                        currentY = initialPanY + deltaY;
                        applyTransform();
                    }
                });

                interactionLayer.addEventListener('touchend', (e) => {
                    if (e.touches.length < 2) {
                        initialPinchDistance = null;
                    }
                    // Constrain pan when zoom ends/panning ends
                    if (currentScale === 1) {
                        currentX = 0;
                        currentY = 0;
                        applyTransform();
            }
        });

            // Double Tap and UI Auto-Hide
        const fsText = document.getElementById('fsText');
        const fsIcon = document.getElementById('fsIcon');

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
            wakeUI();
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsText.textContent = "Salir";
                fsIcon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
            } else {
                fsText.textContent = "Pantalla";
                fsIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });

            let hideTimeout;
            const uiElements = [document.getElementById('uiTop'), document.getElementById('uiBottom'), document.getElementById('uiHint')];
            let isUIHidden = false;

            function hideUI() {
            if (isSettingsOpen) return; // Don't auto-hide if settings are open
            uiElements.forEach(el => el.classList.add('ui-hidden'));
            isUIHidden = true;
        }

            function wakeUI() {
                uiElements.forEach(el => el.classList.remove('ui-hidden'));
                isUIHidden = false;
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hideUI, 4000);
        }

            let lastTap = 0;
            interactionLayer.addEventListener('touchend', function (e) {
            if (e.changedTouches.length > 1) return; // Ignore if it was a pinch release
            
            // Handle double tap
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;

            if (tapLength < 400 && tapLength > 0 && currentScale === 1) { // Only allow double tap full screen if not zoomed
                toggleFullScreen();
            } else if (e.target === interactionLayer) {
                if (isSettingsOpen) {
                    isSettingsOpen = false;
                    settingsPanel.classList.remove('active');
                }

                if (isUIHidden) { wakeUI(); }
                else { hideUI(); }
            }
            lastTap = currentTime;
        });

            interactionLayer.addEventListener('mousemove', wakeUI);



            // Wake Lock API 
            let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') { requestWakeLock(); }
            checkActive = document.visibilityState === 'visible';
            if (checkActive) checkConnection();
        });

    wakeUI();
        document.body.addEventListener('touchstart', requestWakeLock, { once: true });
            document.body.addEventListener('click', requestWakeLock, { once: true });
    </script>
