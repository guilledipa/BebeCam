<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BebeCam - Monitor de Bebé</title>
    <!-- Modern, friendly premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #1e1b4b; /* Deep Indigo */
            --bg-end: #0f172a; /* Slate 900 */
            --glass-bg: rgba(30, 41, 59, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --live-glow: #f43f5e; /* Rose 500 */
            --btn-gradient-1: #6366f1; /* Indigo 500 */
            --btn-gradient-2: #a855f7; /* Purple 500 */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, var(--bg-start), var(--bg-end) 80%);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Auto-hide classes */
        .ui-layer {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            position: absolute;
            width: 100%;
            pointer-events: none; /* Let the container pass clicks, children re-enable */
        }

        .ui-hidden {
            opacity: 0;
            pointer-events: none !important;
        }

        .ui-hidden.top-bar { transform: translateY(-20px); }
        .ui-hidden.controls-container { transform: translateY(20px) scale(0.95); }

        /* Top Bar */
        .top-bar {
            top: 0;
            left: 0;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(15,23,42,0.9) 0%, rgba(15,23,42,0) 100%);
            pointer-events: auto;
            box-sizing: border-box;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-text { display: flex; flex-direction: column; }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 16px rgba(199,210,254,0.3);
            margin-bottom: -4px;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: #818cf8;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Glowing Live Badge */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(244, 63, 94, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 99px;
            border: 1px solid rgba(244, 63, 94, 0.3);
            box-shadow: 0 8px 16px -4px rgba(244, 63, 94, 0.2), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: var(--live-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--live-glow), 0 0 20px var(--live-glow);
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .live-text {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ffe4e6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(244,63,94,0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        /* Video Container */
        .video-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: contain;
            pointer-events: none; /* Let touches hit the wrapper to wake up UI */
        }

        /* Interactive overlay for waking up UI */
        .interaction-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 40;
        }

        /* Bottom Controls */
        .controls-container {
            bottom: 40px;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .controls-bar {
            display: flex;
            gap: 16px;
            padding: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            pointer-events: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.15);
            max-width: 500px;
            width: 100%;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            color: white;
            padding: 18px 28px;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn-refresh {
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5), inset 0 1px 1px rgba(255,255,255,0.3);
            border: none;
            flex-grow: 1;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .hint {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            letter-spacing: 0.05em;
        }

    </style>
</head>
<body>

    <div class="video-wrapper" id="videoWrapper">
        <iframe id="streamFrame" src="" allow="autoplay; fullscreen; playsinline"></iframe>
    </div>
    
    <!-- Invisible layer to catch taps -->
    <div class="interaction-layer" id="interactionLayer"></div>
    
    <!-- UI Overlay -->
    <div class="ui-layer top-bar" id="uiTop">
        <div class="brand">
            <div class="brand-text">
                <span class="brand-title">BebeCam</span>
                <span class="brand-subtitle">Cámara Trasera</span>
            </div>
        </div>
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span class="live-text">En Vivo</span>
        </div>
    </div>

    <div class="ui-layer controls-container" id="uiBottom">
        <div class="controls-bar">
            <button class="btn btn-refresh" onclick="reloadStream()" aria-label="Recargar Video">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
            <button class="btn btn-fullscreen" onclick="toggleFullScreen()" id="fsBtn">
                <svg class="icon" viewBox="0 0 24 24" id="fsIcon">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
                <span id="fsText">Pantalla Completa</span>
            </button>
        </div>
    </div>
    <div class="ui-layer hint" id="uiHint">Toca la pantalla para ocultar/mostrar controles</div>

    <script>
        const host = window.location.hostname;
        const iframe = document.getElementById('streamFrame');
        iframe.src = `http://${host}:8889/bebe`;

            function reloadStream() {
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => { iframe.src = currentSrc; }, 50);
            wakeUI(); 
        }

        // Fullscreen Logic
        const fsText = document.getElementById('fsText');
        const fsIcon = document.getElementById('fsIcon');
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
            wakeUI();
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsText.textContent = "Salir";
                fsIcon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
            } else {
                fsText.textContent = "Pantalla Completa";
                fsIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });

            // Auto-Hide UI Logic
            let hideTimeout;
            const uiElements = [document.getElementById('uiTop'), document.getElementById('uiBottom'), document.getElementById('uiHint')];
            let isUIHidden = false;

            function hideUI() {
                uiElements.forEach(el => el.classList.add('ui-hidden'));
                isUIHidden = true;
            }

            function wakeUI() {
                uiElements.forEach(el => el.classList.remove('ui-hidden'));
                isUIHidden = false;

                clearTimeout(hideTimeout);
                hideTimeout = setTimeout(hideUI, 3500); // Auto hide after 3.5s
            }

            // Tap interactions
        let lastTap = 0;
            const interactionLayer = document.getElementById('interactionLayer');

            interactionLayer.addEventListener('touchend', function (e) {
                e.preventDefault(); // Prevent ghost clicks

            // Handle double tap
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;

            if (tapLength < 400 && tapLength > 0) {
                toggleFullScreen();
            } else {
                // Single tap: toggle UI
                if (isUIHidden) {
                    wakeUI();
                } else {
                    hideUI();
                }
            }
            lastTap = currentTime;
        });

            interactionLayer.addEventListener('mousemove', wakeUI);

            // Wake Lock API - Prevent screen from turning off
            let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.error(err); }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') { requestWakeLock(); }
        });
        
            wakeUI();
        document.body.addEventListener('touchstart', requestWakeLock, { once: true });
            document.body.addEventListener('click', requestWakeLock, { once: true });
    </script>
</body>
</html>
