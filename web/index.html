<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BebeCam - Monitor de Bebé</title>
    <style>
        :root {
            --primary: #6366f1;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --accent: #f43f5e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .video-container {
            width: 90vw;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background-color: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
        }

        .btn {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0;
        }

        .overlay {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot"></div>
        <h1>BEBECAM LIVE</h1>
    </div>

    <div class="video-container">
        <!-- MediaMTX WebRTC viewer will be embedded here -->
        <iframe src="/bebe" allow="autoplay; fullscreen"></iframe>
        <div class="overlay">VISTA TRASERA • EN VIVO</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="location.reload()">
            <span>🔄</span> Refrescar
        </button>
        <button class="btn" onclick="toggleFullScreen()">
            <span>📺</span> Pantalla Completa
        </button>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        // Auto-detect the IP if accessed via the AP
        const host = window.location.hostname;
        const iframe = document.querySelector('iframe');
        iframe.src = `http://${host}:8889/bebe`;
    </script>
</body>
</html>
