- name: Install and Configure BebeCam
  hosts: bebecam
  vars:
    project_root: "/home/guilledipa/Documents/Go/BebeCam"
    install_dir: "/opt/bebecam"
    ap_ssid: "BebeCam"
    ap_password: "bebecam"
    wifi_ssid: "TU_WIFI_CASA" # REEMPLAZA ESTO CON EL NOMBRE DE TU RED WI-FI (Home Network)
    ap_ip_addr: "192.168.4.1/24"
    wifi_interface: "wlan0"
    mediamtx_version: "v1.9.0"
    # Map Ansible architecture to MediaMTX release naming
    mediamtx_arch_map:
      aarch64: "linux_arm64v8"
      armv7l: "linux_armv7"
      x86_64: "linux_amd64"
    mediamtx_arch: "{{ mediamtx_arch_map[ansible_architecture] | default('linux_amd64') }}"
    # Map GStreamer encoder and source based on architecture/board type
    board_type: "rpi" # can be 'rpi' or 'radxa'
    
    video_source_map:
      aarch64: "v4l2src device=/dev/video0" # Radxa Zero 3W
      armv7l: "libcamerasrc ! v4l2convert ! video/x-raw,format=NV12" # Raspberry Pi (Camera Module 1.3/3)
    video_source: "{{ video_source_map[ansible_architecture] | default('v4l2src device=/dev/video0') }}"
    
    video_resolution_map:
      aarch64: "width=1920,height=1080"
      armv7l: "width=1280,height=720"
    video_resolution: "{{ video_resolution_map[ansible_architecture] | default('width=1280,height=720') }}"
    
    video_encoder_map:
      aarch64: "mpph264enc"
      armv7l: "v4l2h264enc"
    video_encoder: "{{ video_encoder_map[ansible_architecture] | default('x264enc') }}"

    # Full video pipeline command
    # Using explicit RTSP port 8554 because MediaMTX no longer injects $RTSP_PORT
    video_pipeline_map:
      rpi: "rpicam-vid -t 0 --nopreview --inline --width 1024 --height 768 --framerate 20 --bitrate 1500000 --intra 10 --profile baseline -o - | ffmpeg -hide_banner -loglevel error -fflags nobuffer -flags low_delay -f h264 -i pipe:0 -c copy -f rtsp rtsp://127.0.0.1:8554/bebe"
      radxa: "gst-launch-1.0 {{ video_source }},{{ video_resolution }},framerate=30 ! {{ video_encoder }} ! h264parse ! rtspclientsink location=rtsp://127.0.0.1:8554/bebe"
    
    video_pipeline: "{{ video_pipeline_map[board_type] | default(video_pipeline_map['rpi']) }}"
    # Map Ansible architecture to Go GOARCH
    go_arch_map:
      aarch64: "arm64"
      armv7l: "arm"
      x86_64: "amd64"
    go_arch: "{{ go_arch_map[ansible_architecture] | default('amd64') }}"

  handlers:
    - name: Restart mediamtx
      ansible.builtin.systemd:
        name: mediamtx
        state: restarted
      become: true

    - name: Restart dashboard
      ansible.builtin.systemd:
        name: bebecam-dashboard
        state: restarted
      become: true

    - name: Restart watchdog
      ansible.builtin.systemd:
        name: watchdog
        state: restarted
        daemon_reload: true
      become: true

    - name: Restart wifi-watchdog
      ansible.builtin.systemd:
        name: wifi-watchdog
        state: restarted
        daemon_reload: true
      become: true

    - name: Reboot system
      ansible.builtin.reboot:
      become: true

  roles:
    - role: ap
    - role: mediamtx
    - role: dashboard
    - role: hardening
