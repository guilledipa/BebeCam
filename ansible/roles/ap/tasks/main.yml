---
- name: Configure Ethernet interface (eth0) for Internet Sharing (DHCP client)
  community.general.nmcli:
    type: ethernet
    conn_name: "DirectEthernet"
    ifname: "eth0"
    state: up
    autoconnect: true
    method4: auto
  become: true

- name: Install dnsmasq for isolated DHCP
  ansible.builtin.apt:
    name: dnsmasq
    state: present
  become: true

- name: Configure dnsmasq for AP without gateway/DNS
  ansible.builtin.template:
    src: bebecam_ap.conf.j2
    dest: /etc/dnsmasq.d/bebecam_ap.conf
    mode: "0644"
    owner: root
    group: root
  become: true
  notify: Restart dnsmasq

- name: Ensure dnsmasq is enabled
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
  become: true

- name: Configure Wi-Fi Hotspot (AP)
  community.general.nmcli:
    type: wifi
    conn_name: "{{ ap_ssid }}"
    ifname: "{{ wifi_interface }}"
    ssid: "{{ ap_ssid }}"
    state: up
    autoconnect: true
    ip4: "{{ ap_ip_addr }}"
    method4: manual
    wifi:
      mode: ap
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ ap_password }}"
  become: true

- name: Force explicit 2.4GHz band, Channel 6, disable IPv6, and disable PMF to fix Android connection bug
  ansible.builtin.command:
    cmd: "nmcli connection modify '{{ ap_ssid }}' 802-11-wireless.band bg 802-11-wireless.channel 6 ipv6.method disabled wifi-sec.proto rsn wifi-sec.pairwise ccmp wifi-sec.group ccmp wifi-sec.pmf 1 ipv4.never-default yes ipv4.ignore-auto-routes yes ipv4.gateway '' "
  become: true
  ignore_errors: true
  changed_when: false

- name: Reload NetworkManager to apply band and IPv6 fixes
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded
  become: true
  changed_when: false
