---
- name: Install watchdog package
  ansible.builtin.apt:
    name: watchdog
    state: present
  become: true

- name: Disable conflicting wd_keepalive service
  ansible.builtin.systemd:
    name: wd_keepalive
    enabled: false
    state: stopped
  become: true
  failed_when: false

- name: Ensure watchdog is stopped before configuration
  ansible.builtin.systemd:
    name: watchdog
    state: stopped
  become: true

- name: Enable hardware watchdog (Radxa Zero 3W)
  ansible.builtin.template:
    src: watchdog.conf.j2
    dest: /etc/watchdog.conf
    mode: "0644"
  become: true
  notify: Restart watchdog

- name: Enable and start watchdog service
  ansible.builtin.systemd:
    name: watchdog
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Ensure NetworkManager is installed
  ansible.builtin.apt:
    name: network-manager
    state: present
  become: true

- name: Configure WiFi autoconnect and retries
  ansible.builtin.command:
    cmd: "nmcli connection modify '{{ wifi_ssid }}' connection.autoconnect yes connection.autoconnect-retries 0"
  become: true
  ignore_errors: true
  register: hardening_nmcli_result
  changed_when: hardening_nmcli_result.rc == 0

- name: Install simple WiFi watchdog script
  ansible.builtin.template:
    src: wifi-watchdog.sh.j2
    dest: /usr/local/bin/wifi-watchdog.sh
    mode: "0755"
  become: true

- name: Create WiFi watchdog systemd service
  ansible.builtin.template:
    src: wifi-watchdog.service.j2
    dest: /etc/systemd/system/wifi-watchdog.service
    mode: "0644"
  become: true
  notify: Restart wifi-watchdog

- name: Enable and start WiFi watchdog
  ansible.builtin.systemd:
    name: wifi-watchdog
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Optimize logging to RAM via tmpfs
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "tmpfs /var/log tmpfs defaults,noatime,nosuid,mode=0755,size=10m 0 0"
    state: present
  become: true
  notify: Reboot system
