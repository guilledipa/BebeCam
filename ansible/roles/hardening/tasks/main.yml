---
- name: Install watchdog package
  ansible.builtin.apt:
    name: watchdog
    state: present
  become: true

- name: Disable conflicting wd_keepalive service
  ansible.builtin.systemd:
    name: wd_keepalive
    enabled: false
    state: stopped
  become: true
  failed_when: false

- name: Ensure watchdog is stopped before configuration
  ansible.builtin.systemd:
    name: watchdog
    state: stopped
  become: true

- name: Enable hardware watchdog (Radxa Zero 3W)
  ansible.builtin.template:
    src: watchdog.conf.j2
    dest: /etc/watchdog.conf
    mode: "0644"
  become: true
  notify: Restart watchdog

- name: Enable and start watchdog service
  ansible.builtin.systemd:
    name: watchdog
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Ensure NetworkManager is installed
  ansible.builtin.apt:
    name: network-manager
    state: present
  become: true

- name: Configure WiFi autoconnect and retries
  ansible.builtin.command:
    cmd: "nmcli connection modify '{{ wifi_ssid }}' connection.autoconnect yes connection.autoconnect-retries 0"
  become: true
  ignore_errors: true
  register: hardening_nmcli_result
  changed_when: hardening_nmcli_result.rc == 0

- name: Install simple WiFi watchdog script
  ansible.builtin.copy:
    dest: /usr/local/bin/wifi-watchdog.sh
    content: |
      #!/bin/bash
      WIFI_SSID="{{ wifi_ssid }}"
      AP_SSID="{{ ap_ssid }}"

      while true; do
        # Check if we are connected to the home network
        if nmcli -t -f active,ssid dev wifi | grep -q "^yes:$WIFI_SSID"; then
          # We are on the home network, ensure AP is down
          if nmcli -t -f active,ssid dev wifi | grep -q "^yes:$AP_SSID"; then
             nmcli con down "$AP_SSID"
          fi
        else
          # Not on home network
          # Is AP already up?
          if nmcli -t -f active,ssid dev wifi | grep -q "^yes:$AP_SSID"; then
            echo "AP is running. Scanning for home network..."
            # Periodically we could bring AP down to scan, but for a car setup,
            # turning off the car cuts power. When powered on at home, it connects to Wi-Fi.
            # So if AP is up, we just stay in AP mode until next reboot.
            sleep 60
            continue
          fi

          # Neither is up. Try to connect to home wifi.
          if nmcli con up "$WIFI_SSID" > /dev/null 2>&1; then
            echo "Connected to home wifi."
          else
            echo "Home wifi not found. Starting AP."
            nmcli con up "$AP_SSID"
          fi
        fi
        sleep 30
      done
    mode: "0755"
  become: true

- name: Create WiFi watchdog systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/wifi-watchdog.service
    content: |
      [Unit]
      Description=WiFi Connectivity Watchdog
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/wifi-watchdog.sh
      Restart=always

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  become: true
  notify: Restart wifi-watchdog

- name: Enable and start WiFi watchdog
  ansible.builtin.systemd:
    name: wifi-watchdog
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Optimize logging to RAM via tmpfs
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "tmpfs /var/log tmpfs defaults,noatime,nosuid,mode=0755,size=10m 0 0"
    state: present
  become: true
  notify: Reboot system
